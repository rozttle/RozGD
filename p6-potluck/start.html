<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Potluck</title>
    <link rel="stylesheet" href="https://use.typekit.net/bnz5jgi.css">
    <style type="text/css">
        body {
            margin-top: 5%;
            margin-left: 10%;
            margin-right: 10%;
            margin-bottom: 15%;
            font-family: "edu-au-vic-wa-nt-pre";
        }

        #boarder {
            width: auto;
            height: auto;
            display: block;
            border-radius: 25px;
            padding-top: 80px;
            padding-bottom: 100px;
            text-align: center;
        }

        input {
            background-color: seashell;
            border-color: crimson;
            border-radius: 10px;
            border-width: 1px;
            padding: 15px;
            height: 10px;
            font-size: 14px;
            font-family: "edu-nsw-act-hand-precursive";
        }

        h2 {
            color: crimson;
            font-weight: 200;
        }
    </style>
</head>

<Body>
    <div id="boarder">
        <h2>Organizing a potluck?</h2>
        <br>
        <h2>Tell us your name first:</h2>
        <input type="text">
    </div>
</Body>
