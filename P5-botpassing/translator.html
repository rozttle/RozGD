<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Botpassing Encryptor</title>
    <link rel="stylesheet" href="https://use.typekit.net/psd7sag.css">
    <style type="text/css">
        body {
            margin-top: 5%;
            margin-left: 10%;
            margin-right: 10%;
            margin-bottom: 15%;
            background-color: ivory;
            font-family: "iskra", sans-serif;
        }

        #boarder {
            width: auto;
            height: auto;
            display: block;
            border: dotted 4px rgb(98, 191, 0);
            border-radius: 25px;
            padding-top: 50px;
            padding-bottom: 100px;
            text-align: center;
        }

        input {
            background-color: beige;
            border-radius: 15px;
            margin: 50px;
            padding: 15px;
            width: 450px;
            font-size: 16px;
        }

        #foot {
            color: rgb(98, 191, 0);
            font-size: 10pt;
            padding: 10px;
            padding-left: 20px;
            text-align: left;
        }

        #result {
            margin-top: 50px;
            font-size: 18pt;
            color: goldenrod;
        }

        h1 {
            color: rgb(98, 191, 0);
            font-size: 36pt
        }

        h4 {
            font-family: iskra, sans-serif;
            font-weight: 400;
            font-size: 14pt;
            font-style: italic;
            color: rgb(98, 191, 0)
        }

        a {
            padding: 10px;
            color: rgb(98, 191, 0);
            border: solid 2px rgb(98, 191, 0);
            border-radius: 15px;
            font-size: 18pt;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        a:hover {
            color: goldenrod;
            border: dotted 4px goldenrod;

        }

        .floater {
            animation: floaty 2.5s ease-in-out infinite;
        }

        .floater2 {
            animation: floaty2 3s ease-in-out infinite;
        }

        @keyframes floaty {
            0% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }

        @keyframes floaty2 {
            0% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(+4px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>

</head>

<Body>
    <div id="boarder">
        <h1>Bot-passing Encryptor</h1>
        <h4 class='floater'>Creat your bot-proof message here:</h4>
        <input type="text" id="textInput" placeholder=" Type your secret message here. . .">
        <br>
        <br>
        <a onclick="translateText()">Encrypt!</a>
        <div id="result"></div>
        <script>
            function translateText() {
                const input = document.getElementById("textInput").value;

                let result = input;

                result = result.replace(/oo/gi, "∞");

                result = result.replace(/o/gi, "0");

                result = result.replace(/e/gi, "3");

                result = result.replace(/i/gi, "!");

                document.getElementById("result").innerText = result;
            }
        </script>

    </div>
    <div id="foot">
        2026 ◉_◉ by "CanUS33Me"
    </div>

</Body>
