<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Botpassing Encryptor</title>
    <link rel="stylesheet" href="https://use.typekit.net/psd7sag.css">
    <style type="text/css">
        body {
            margin-top: 5%;
            margin-left: 10%;
            margin-right: 10%;
            margin-bottom: 15%;
            background-color: ivory;
            font-family: "iskra", sans-serif;
        }

        #boarder {
            width: auto;
            height: auto;
            display: block;
            border: dotted 4px rgb(98, 191, 0);
            border-radius: 25px;
            padding-top: 50px;
            padding-bottom: 100px;
            text-align: center;
        }

        .big-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        .input-box,
        .output-box {
            width: 450px;
            box-sizing: border-box;
        }

        .output-box {
            background-color: beige;
            border-radius: 15px;
            padding: 15px;
            border: solid 1px gray;
            min-height: 150px;
            width: 450px;
            text-align: left;
        }

        textarea {
            background-color: beige;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            height: 150px;
            font-size: 16px;
            resize: vertical;
        }

        #foot {
            color: rgb(98, 191, 0);
            font-size: 10pt;
            padding: 10px;
            padding-left: 20px;
            text-align: left;
        }

        #result {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: 14pt;
            color: goldenrod;
        }

        h1 {
            color: rgb(98, 191, 0);
            font-size: 36pt;
            margin-bottom: 10px;
        }

        h4 {
            font-family: iskra, sans-serif;
            font-weight: 400;
            font-size: 14pt;
            font-style: italic;
            color: rgb(98, 191, 0);
            margin-top: 0px;
            margin-bottom: 0px;
        }

        a {
            padding: 10px;
            color: rgb(98, 191, 0);
            border: solid 2px rgb(98, 191, 0);
            border-radius: 15px;
            font-size: 18pt;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        a:hover {
            color: goldenrod;
            border: dotted 4px goldenrod;
        }

        .title {
            border: none;
            color: inherit;
        }

        .title:hover {
            border: none;
        }

        .floater {
            animation: floaty 2.5s ease-in-out infinite;
        }

        .floater2 {
            animation: floaty2 3s ease-in-out infinite;
        }

        @keyframes floaty {
            0% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }

        @keyframes floaty2 {
            0% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(+4px);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>

</head>

<Body>
    <div id="boarder">
        <a href="homepage.html " class="title">
            <h1>BΘT-passing Ξncrγpt0r</h1>
        </a>
        <h4 class='floater'>Creαt your bot-pr∞f messαge hεrε:</h4>
        <div class="big-container">
            <div class="input-box">
                <textarea id="Input" placeholder="Type your secret message here..."></textarea>
            </div>
            <div class="output-box">
                <div id="result"></div>
            </div>
        </div>
        <br><br>
        <a onclick="translateText()">Encrypt!</a>
        <a onClick="window.location.reload();">Clear</a>
        <script>
            function translateText() {
                const input = document.getElementById("Input").value;

                let result = input;

                result = result.replace(/oo/gi, "∞");

                result = result.replace(/o/gi, () => {
                    return Math.random() > 0.5 ? "0" : "ο";
                });

                result = result.replace(/a/gi, () => {
                    return Math.random() > 0.5 ? "α" : "@";
                });

                result = result.replace(/b/gi, () => {
                    return Math.random() > 0.5 ? "b" : "β";
                });

                result = result.replace(/e/gi, () => {
                    return Math.random() > 0.5 ? "3" : "ε";
                });

                result = result.replace(/i/gi, () => {
                    return Math.random() > 0.5 ? "!" : "ι";
                });

                result = result.replace(/u/gi, () => {
                    return Math.random() > 0.5 ? "μ" : "υ";
                });

                result = result.replace(/i/gi, "!");

                result = result.replace(/d/gi, "d");

                result = result.replace(/y/gi, "γ");

                result = result.replace(/p/gi, "ρ");

                result = result.replace(/n/gi, "η");

                result = result.replace(/l/gi, "1");

                result = result.replace(/j/gi, "ʝ");

                result = result.replace(/q/gi, "զ");

                result = result.replace(/k/gi, "κ");

                document.getElementById("result").innerText = result;
            }
        </script>

    </div>
    <div id="foot">
        2026 ◉_◉ by "CanUS33Me"
    </div>

</Body>
