<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Potluck</title>
    <link rel="stylesheet" href="https://use.typekit.net/bnz5jgi.css">
    <style type="text/css">
        body {
            margin-top: 1%;
            margin-bottom: 5%;
            font-family: "edu-au-vic-wa-nt-pre";
            text-align: center;
        }

        #border {
            width: auto;
            height: auto;
            display: flex;
            border-radius: 25px;
            margin-left: 5%;
            margin-right: 5%;
            padding-top: 5px;
            padding-bottom: 100px;
            text-align: center;
        }

        #photo {
            width: 60%;
            height: auto;
            display: block;
            align-items: center;
            text-align: center;
        }

        #info {
            width: 40%;
            height: auto;
            display: block;
            text-align: left;
        }

        #preview {
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
            max-height: 300px;
            border-radius: 50%;
            display: none;
        }

        input {
            background-color: seashell;
            border-color: crimson;
            border-radius: 10px;
            border-width: 1px;
            width: 350px;
            padding: 15px;
            font-size: 14px;
            font-family: "edu-nsw-act-hand-precursive";
        }

        textarea {
            background-color: seashell;
            width: 350px;
            height: 100px;
            padding: 15px;
            border-color: crimson;
            border-width: 1px;
            border-radius: 10px;
            font-size: 14px;
            font-family: "edu-nsw-act-hand-precursive";
        }

        hr {
            border: 0.5px solid crimson;
        }

        h2 {
            color: crimson;
            font-weight: 200;
        }

        h3 {
            color: crimson;
            font-weight: 150;
        }

        a {
            margin: 15px;
            padding: 15px;
            color: crimson;
            border: solid 1px crimson;
            border-radius: 50%;
            font-size: 14pt;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        a:hover {
            color: goldenrod;
        }
    </style>
</head>

<Body>
    <h2 id="title"></h2>
    <hr>
    <br>
    <h3>Tell Us a Little About What You Bring Here!</h3>
    <div id="border">
        <div id="photo">
            <h3>Choose a phto:</h3>
            <br>
            <input type="file" id="dishphoto" name="dishphoto" accept="image/png, image/jpeg" />
            <br>
            <img id="preview" src="" alt="Dish Preview">

        </div>
        <div id="info">
            <h3>Name of the Chef</h3>
            <input type="text" placeholder="Who made this dish?">
            <h3>Name of the Dish</h3>
            <input type="text" placeholder="What do you call this dish?">
            <h3>Origin</h3>
            <input type="text" placeholder="e.g. Traditional Korean food, mother's recipe, etc">
            <h3>Any Potential allergens?</h3>
            <input type="text" placeholder="?">
            <h3>Ingredient Used</h3>
            <textarea placeholder="List the ingredients used in this dish..."></textarea>
        </div>
    </div>
    <a href="guest-4-dishplaced.html">Place the Dish!</a>
    <script>
        window.onload = function () {

            const name = localStorage.getItem("potluckName");

            document.getElementById("title").innerText =
                "What Would You Bring to " + name + "'s table?";

            const fileInput = document.getElementById("dishphoto");
            const preview = document.getElementById("preview");

            fileInput.addEventListener("change", function () {

                const file = this.files[0];

                if (file) {

                    const reader = new FileReader();

                    reader.addEventListener("load", function () {

                        preview.src = reader.result;
                        preview.style.display = "block";

                        localStorage.setItem("dishImage", reader.result);

                    });

                    reader.readAsDataURL(file);
                }
            });
        }
    </script>
</Body>
