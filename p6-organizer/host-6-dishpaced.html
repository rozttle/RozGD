<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Potluck</title>
    <link rel="stylesheet" href="https://use.typekit.net/bnz5jgi.css">
    <style type="text/css">
        body {
            margin-top: 1%;
            margin-bottom: 5%;
            font-family: "edu-au-vic-wa-nt-pre";
            text-align: center;
        }

        #border {
            width: auto;
            min-height: 700px;
            display: block;
            border-radius: 25px;
            padding-top: 40px;
            padding-bottom: 100px;
            text-align: center;
            background-image: url(0-links/table.svg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 70%;
        }

        input {
            background-color: seashell;
            border-color: crimson;
            border-radius: 10px;
            border-width: 1px;
            padding: 15px;
            font-size: 14px;
            font-family: "edu-nsw-act-hand-precursive";
        }

        #dishDisplay {
            max-width: 200px;
            border-radius: 50%;
        }

        .dishContainer {
            position: relative;
            display: inline-block;
        }

        .dishInfo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            background-color: seashell;
            padding: 15px;
            border: double, 5px, crimson;
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s ease;
            pointer-events: none;
            text-align: left;
            color: crimson;
        }

        .dishContainer:hover .dishInfo {
            opacity: 1;
        }

        hr {
            border: 0.5px solid crimson;
        }

        h2 {
            color: crimson;
            font-weight: 200;
        }

        a {
            margin: 15px;
            padding: 15px;
            color: crimson;
            border: solid 1px crimson;
            border-radius: 50%;
            font-size: 14pt;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        a:hover {
            color: goldenrod;
        }
    </style>
</head>

<script>
    window.onload = function () {

        const name = localStorage.getItem("potluckName");

        document.getElementById("title").innerText =
            name + "'s Table";


        const savedImage = localStorage.getItem("dishImage");

        if (savedImage) {

            const img = document.getElementById("dishDisplay");

            img.src = savedImage;
        }
        document.getElementById("dishTitle").innerText =
            localStorage.getItem("dishName");

        document.getElementById("chefName").innerText =
            "CHEF: " +
            localStorage.getItem("dishChef");

        document.getElementById("dishOrigin").innerText =
            "ORIGIN: " +
            localStorage.getItem("dishOrigin");

        document.getElementById("dishIngredients").innerText =
            "INGREDIENTS: " +
            localStorage.getItem("dishIngredients");

        document.getElementById("dishAllergens").innerText =
            "ALLERGENS: " +
            localStorage.getItem("dishAllergens");

    }
</script>

<Body>
    <h2 id="title"></h2>
    <hr>
    <br>
    <a href="host-5-dish.html">Add Item</a>
    <a href="host-4-invite.html">Send Invitation</a>
    <a href="host-2-info.html">Edit Party Info</a>
    <br>
    <br>
    <div id="border">
        <div class="dishContainer">

            <img id="dishDisplay" src="">

            <div class="dishInfo">

                <h3 id="dishTitle"></h3>

                <p id="chefName"></p>

                <p id="dishOrigin"></p>

                <p id="dishIngredients"></p>

                <p style="color: crimson;" id="dishAllergens"></p>

            </div>

        </div>
    </div>
</Body>
