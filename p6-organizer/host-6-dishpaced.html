<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Potluck</title>
    <link rel="stylesheet" href="https://use.typekit.net/bnz5jgi.css">
    <style type="text/css">
        body {
            margin-top: 1%;
            margin-bottom: 5%;
            font-family: "edu-au-vic-wa-nt-pre";
            text-align: center;
        }

        #border {
            width: auto;
            min-height: 700px;
            display: block;
            border-radius: 25px;
            padding-top: 40px;
            padding-bottom: 100px;
            text-align: center;
            background-image: url(0-links/table.svg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 70%;
        }

        input {
            background-color: seashell;
            border-color: crimson;
            border-radius: 10px;
            border-width: 1px;
            padding: 15px;
            font-size: 14px;
            font-family: "edu-nsw-act-hand-precursive";
        }

        #dishDisplay {
            max-width: 200px;
            border-radius: 50%;
        }

        hr {
            border: 0.5px solid crimson;
        }

        h2 {
            color: crimson;
            font-weight: 200;
        }

        a {
            margin: 15px;
            padding: 15px;
            color: crimson;
            border: solid 1px crimson;
            border-radius: 50%;
            font-size: 14pt;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        a:hover {
            color: goldenrod;
        }
    </style>
</head>

<script>
    window.onload = function () {

        const name = localStorage.getItem("potluckName");

        document.getElementById("title").innerText =
            name + "'s Table";


        const savedImage = localStorage.getItem("dishImage");

        if (savedImage) {

            const img = document.getElementById("dishDisplay");

            img.src = savedImage;
        }
    }
</script>

<Body>
    <h2 id="title"></h2>
    <hr>
    <br>
    <a href="host-5-dish.html">Add Item</a>
    <a href="host-4-invite.html">Send Invitation</a>
    <a href="host-2-info.html">Edit Party Info</a>
    <br>
    <br>
    <div id="border">
        <img id="dishDisplay" src="">
    </div>
</Body>
